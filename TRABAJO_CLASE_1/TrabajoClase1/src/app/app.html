<div class="d-flex min-vh-100 align-items-center justify-content-center bg-light">
  <div class="card shadow" style="max-width: 400px; width: 100%">
    <div class="card-body p-4">

      <h1 class="card-title text-center mb-4 fs-4 fw-bold">
        Tarea Clase 1
      </h1>

      <div class="mb-3">
        <label class="form-label">Edad 1</label>
        <input
          type="number"
          min="1"
          class="form-control"
          [(ngModel)]="numeroUno"
          placeholder="Ingrese la primera edad"
          required="yes">
      </div>

      <div class="mb-3">
        <label class="form-label">Edad 2</label>
        <input
          type="number"
          class="form-control"
          min="1"
          [(ngModel)]="numeroDos"
          placeholder="Ingrese la segunda edad">
      </div>

      <div class="d-flex gap-2 mb-4">
        <button class="btn btn-primary flex-fill" (click)="Calcular($event)">
          Calcular
        </button>

        <button class="btn btn-outline-secondary flex-fill" (click)="resetear($event)">
          Resetear
        </button>
      </div>

      <div class="row g-3">
        <div class="col-6">
          <div class="border rounded p-3 text-center bg-white">
            <small class="text-muted d-block mb-1">Suma</small>
            <span class="fs-4 fw-bold">
              {{ resultado !== 0 ? resultado : '—' }}
            </span>
          </div>
        </div>

        <div class="col-6">
          <div class="border rounded p-3 text-center bg-white">
            <small class="text-muted d-block mb-1">Promedio</small>
            <span class="fs-4 fw-bold">
              {{ promedio !== 0 ? promedio : '—' }}
            </span>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<router-outlet></router-outlet>
